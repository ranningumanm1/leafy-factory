name: generate-batch

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 22 * * 0"   # 毎週日曜22:00 UTC（≈ 月曜07:00 JST）

permissions:
  contents: write          # Releaseアップロード & shotlist.csv の push に必要

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-noto-cjk
      - name: Install python deps
        run: pip install -r requirements.txt
      - name: Generate clips
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}
          LORA_URL: ${{ secrets.LORA_URL }}
          TRIGGER_WORD: leafy_catspirit
          BATCH_SIZE: "5"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python pipeline.py
      - name: Commit backlog progress
        run: |
          git config user.name "leafy-bot"
          git config user.email "leafy-bot@users.noreply.github.com"
          git add shotlist.csv || true
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore: クリップ生成・ネタ消費 [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash && git push && break
            sleep 5
          done
