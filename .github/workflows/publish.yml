name: publish

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 * * * *"    # 毎時：Telegramの押下を回収し、承認済みを1日1本ドリップ投稿

permissions:
  contents: write          # state.json の push に必要

concurrency:
  group: leafy-state       # generate と state.json を取り合わないよう直列化
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install python deps
        run: pip install -r requirements.txt
      - name: Collect approvals & drip-publish
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          POSTS_PER_DAY: "1"
        run: python publisher.py
      - name: Commit state
        run: |
          git config user.name "leafy-bot"
          git config user.email "leafy-bot@users.noreply.github.com"
          git add state.json || true
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore: 承認回収・投稿状況更新 [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash && git push && break
            sleep 5
          done
