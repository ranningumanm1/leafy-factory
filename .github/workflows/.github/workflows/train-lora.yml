name: train-lora

on:
  workflow_dispatch: {}

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Train character LoRA
        env:
          FAL_KEY: ${{ secrets.FAL_KEY }}
          TRIGGER_WORD: leafy_catspirit
          TRAIN_STEPS: "1000"
        run: python train_lora.py
